# Database - falls back to local MySQL if DATABASE_URL env var is not set
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/spotbite?createDatabaseIfNotExist=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:admin}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:spotbite_secret_key_minimum_32_chars_long}
jwt.expiration=86400000

spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.enabled=false
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true
spring.security.filter.order=10

server.port=${PORT:8080}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dmijwksya}
cloudinary.api-key=${CLOUDINARY_API_KEY:962512528443295}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:eBjCYOWBI-x1GgkdxnKW3qDx-5E}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true