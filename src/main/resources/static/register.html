<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotBite — Register</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            width: 100%;
            max-width: 420px;
        }
        .auth-card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .auth-card p {
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .btn-full {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            margin-top: 8px;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .logo-top {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <div class="logo-top">🍽️ SpotBite</div>

        <h2>Create Account</h2>
        <p>Join SpotBite and discover amazing restaurants</p>

        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Your full name" />
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@email.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" />
        </div>

        <button class="btn btn-primary btn-full" onclick="register()">
            Create Account
        </button>

        <div class="auth-footer">
            Already have an account? <a href="/login.html">Login</a>
        </div>

    </div>
</div>

<script src="/js/api.js"></script>
<script>
    async function register() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!name || !email || !password) {
            showError('Please fill in all fields');
            return;
        }

        if (password.length < 6) {
            showError('Password must be at least 6 characters');
            return;
        }

        try {
            const response = await apiCall('/auth/register', 'POST', { name, email, password });

            // Save token and user info
            saveToken(response.token);
            localStorage.setItem('spotbite_user', JSON.stringify({
                name: response.name,
                email: response.email,
                role: response.role
            }));

            showSuccess('Account created! Redirecting...');

            setTimeout(() => {
                window.location.href = '/index.html';
            }, 1500);

        } catch (error) {
            showError('Email already registered or something went wrong.');
        }
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('success-msg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('error-msg').style.display = 'none';
    }
</script>

</body>
</html>
