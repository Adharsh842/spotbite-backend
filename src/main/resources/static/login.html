<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotBite — Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            width: 100%;
            max-width: 420px;
        }
        .auth-card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--secondary);
        }
        .auth-card p {
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--secondary);
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .btn-full {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            margin-top: 8px;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .logo-top {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <div class="logo-top">🍽️ SpotBite</div>

        <h2>Welcome back!</h2>
        <p>Login to find your perfect restaurant</p>

        <div class="error-msg" id="error-msg"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@email.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Your password" />
        </div>

        <button class="btn btn-primary btn-full" onclick="login()">
            Login
        </button>

        <div class="auth-footer">
            Don't have an account? <a href="/register.html">Sign Up</a>
        </div>

    </div>
</div>

<script src="/js/api.js"></script>
<script>
    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('error-msg');

        if (!email || !password) {
            showError('Please fill in all fields');
            return;
        }

        try {
            const response = await apiCall('/auth/login', 'POST', { email, password });

            // Save token and user info
            saveToken(response.token);
            localStorage.setItem('spotbite_user', JSON.stringify({
                name: response.name,
                email: response.email,
                role: response.role
            }));

            // Redirect based on role
            if (response.role === 'ADMIN') {
                window.location.href = '/admin.html';
            } else {
                window.location.href = '/index.html';
            }

        } catch (error) {
            showError('Invalid email or password. Please try again.');
        }
    }

    function showError(msg) {
        const errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }

    // Allow pressing Enter to login
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
